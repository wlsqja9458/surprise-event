<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서프라이즈 이벤트 — 템플릿 모음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 별 */
    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* 헤더 */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeUp 0.8s ease both;
    }
    .header-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    .header-title {
      font-family: 'Gaegu', cursive;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, #ff9a9e, #b388ff, #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      font-family: 'Nanum Myeongjo', serif;
    }

    /* 카드 그리드 */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1.4rem 1.5rem;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      animation: fadeUp 0.8s ease both;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.15);
    }
    .card:hover::before { opacity: 1; }
    .card:active { transform: scale(0.98); }

    /* 카드별 색상 */
    .card-couple::before { background: linear-gradient(135deg, rgba(255,107,138,0.08), rgba(179,136,255,0.08)); }
    .card-couple { animation-delay: 0.1s; }
    .card-couple .card-accent { color: #ff6b8a; }
    .card-couple .card-dot { background: linear-gradient(135deg, #ff6b8a, #b388ff); }

    .card-birthday::before { background: linear-gradient(135deg, rgba(255,159,67,0.08), rgba(255,213,79,0.08)); }
    .card-birthday { animation-delay: 0.2s; }
    .card-birthday .card-accent { color: #ff9f43; }
    .card-birthday .card-dot { background: linear-gradient(135deg, #ff9f43, #ffd54f); }

    .card-family::before { background: linear-gradient(135deg, rgba(224,122,95,0.08), rgba(129,178,154,0.08)); }
    .card-family { animation-delay: 0.3s; }
    .card-family .card-accent { color: #e07a5f; }
    .card-family .card-dot { background: linear-gradient(135deg, #e07a5f, #81b29a); }

    .card-friendship::before { background: linear-gradient(135deg, rgba(0,210,211,0.08), rgba(84,160,255,0.08)); }
    .card-friendship { animation-delay: 0.4s; }
    .card-friendship .card-accent { color: #00d2d3; }
    .card-friendship .card-dot { background: linear-gradient(135deg, #00d2d3, #54a0ff); }

    .card-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .card-dot {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .card-info { flex: 1; }
    .card-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.2rem;
      font-family: 'Nanum Myeongjo', serif;
    }
    .card-title {
      font-family: 'Gaegu', cursive;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.2rem;
    }
    .card-desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
    }
    .card-arrow {
      font-size: 1rem;
      color: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .card:hover .card-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.5);
    }

    /* 푸터 */
    .footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 2px;
      font-family: 'Nanum Myeongjo', serif;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

<div class="bg-stars" id="stars"></div>

<div class="container">
  <div class="header">
    <span class="header-emoji">🎁</span>
    <h1 class="header-title">서프라이즈 이벤트<br>템플릿 모음</h1>
    <p class="header-sub">원하는 테마를 선택하세요</p>
  </div>

  <div class="cards">
    <a class="card card-couple" href="./couple/">
      <div class="card-inner">
        <div class="card-dot">💕</div>
        <div class="card-info">
          <div class="card-label">COUPLE</div>
          <div class="card-title">커플 기념일</div>
          <div class="card-desc">이상형 테스트 → 서프라이즈 이벤트</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </a>

    <a class="card card-birthday" href="./birthday/">
      <div class="card-inner">
        <div class="card-dot">🎂</div>
        <div class="card-info">
          <div class="card-label">BIRTHDAY</div>
          <div class="card-title">생일 축하</div>
          <div class="card-desc">생일 퀴즈 → 서프라이즈 이벤트</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </a>

    <a class="card card-family" href="./family/">
      <div class="card-inner">
        <div class="card-dot">🏡</div>
        <div class="card-info">
          <div class="card-label">FAMILY</div>
          <div class="card-title">가족 감사</div>
          <div class="card-desc">가족 탐구 퀴즈 → 서프라이즈 이벤트</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </a>

    <a class="card card-friendship" href="./friendship/">
      <div class="card-inner">
        <div class="card-dot">🤝</div>
        <div class="card-info">
          <div class="card-label">FRIENDSHIP</div>
          <div class="card-title">우정 찐친</div>
          <div class="card-desc">찐친 테스트 → 서프라이즈 이벤트</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </a>
  </div>

  <div class="footer">MADE WITH LOVE</div>
</div>

<script>
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    const size = 1 + Math.random() * 2.5;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      animation-duration: ${2 + Math.random() * 4}s;
      animation-delay: ${Math.random() * 4}s;
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
